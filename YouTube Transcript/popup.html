<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Transcript → PDF</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #1a1a22;
      background: #f7f7fb;
    }

    /* ── Header bar ── */
    .header {
      background: #4f8ef7;
      padding: 12px 16px 10px;
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .header svg { flex-shrink: 0; }
    .header-title {
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    /* ── Body ── */
    .body { padding: 14px 16px 16px; }

    /* URL row */
    .url-row {
      display: flex;
      align-items: center;
      gap: 7px;
      background: #fff;
      border: 1px solid #e0e0ea;
      border-radius: 7px;
      padding: 7px 10px;
      margin-bottom: 10px;
    }
    #urlBadge {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ccc;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    #urlBadge.valid { background: #34c77b; }
    #urlText {
      font-size: 11px;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Warn box */
    #warnBox {
      display: none;
      background: #fff8e1;
      border: 1px solid #ffe082;
      border-radius: 7px;
      padding: 8px 11px;
      font-size: 11.5px;
      color: #7a5800;
      margin-bottom: 10px;
      line-height: 1.5;
    }
    #warnBox.show { display: block; }

    /* Convert button */
    #convertBtn {
      width: 100%;
      padding: 10px;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    #convertBtn:hover:not(:disabled) { background: #3a7be8; }
    #convertBtn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Progress area */
    #progressArea {
      display: none;
      margin-top: 12px;
    }
    #progressArea.show { display: block; }

    .phase-list {
      list-style: none;
      margin-bottom: 10px;
    }
    .phase-list li {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11.5px;
      color: #999;
      padding: 3px 0;
    }
    .phase-list li .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #ddd;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .phase-list li.active  { color: #4f8ef7; }
    .phase-list li.active  .dot { background: #4f8ef7; }
    .phase-list li.done    { color: #34c77b; }
    .phase-list li.done    .dot { background: #34c77b; }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .bar-track {
      flex: 1;
      height: 5px;
      background: #e4e4ee;
      border-radius: 99px;
      overflow: hidden;
    }
    #barFill {
      height: 100%;
      width: 0%;
      background: #4f8ef7;
      border-radius: 99px;
      transition: width 0.3s ease;
    }
    #phasePct {
      font-size: 11px;
      color: #888;
      min-width: 30px;
      text-align: right;
    }
    #phaseLabel {
      font-size: 11px;
      color: #888;
      min-height: 16px;
    }

    /* Result banner */
    .result-banner {
      display: none;
      margin-top: 10px;
      border-radius: 7px;
      padding: 8px 11px;
      font-size: 12px;
      align-items: center;
      gap: 8px;
    }
    .result-banner.show  { display: flex; }
    .result-banner.success { background: #edfaf3; border: 1px solid #a8e6c4; color: #1a6640; }
    .result-banner.error   { background: #fff0f0; border: 1px solid #f5b8b8; color: #8b1a1a; }
    .result-banner svg { flex-shrink: 0; }
    #resultText { line-height: 1.4; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
         stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="16" y1="13" x2="8" y2="13"/>
      <line x1="16" y1="17" x2="8" y2="17"/>
      <polyline points="10 9 9 9 8 9"/>
    </svg>
    <span class="header-title">YouTube Transcript → PDF</span>
  </div>

  <!-- Body -->
  <div class="body">

    <!-- URL indicator -->
    <div class="url-row">
      <div id="urlBadge"></div>
      <span id="urlText">Detecting page…</span>
    </div>

    <!-- Warning -->
    <div id="warnBox">
      Open a YouTube video and click <strong>⋯ → Show transcript</strong> to load the transcript panel first.
    </div>

    <!-- Action button -->
    <button id="convertBtn" disabled>
      <span id="btnText">Convert to PDF</span>
    </button>

    <!-- Progress -->
    <div id="progressArea">
      <ul class="phase-list">
        <li id="phase-inject">  <span class="dot"></span> Injecting script</li>
        <li id="phase-extract"> <span class="dot"></span> Extracting transcript</li>
        <li id="phase-pdf">     <span class="dot"></span> Building PDF</li>
      </ul>
      <div class="bar-row">
        <div class="bar-track"><div id="barFill"></div></div>
        <span id="phasePct">0%</span>
      </div>
      <div id="phaseLabel"></div>
    </div>

    <!-- Result -->
    <div id="resultBanner" class="result-banner">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline id="resultIcon" points="20 6 9 17 4 12"/>
      </svg>
      <span id="resultText"></span>
    </div>

  </div>

  <script src="lib/jspdf.umd.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
